<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dennis Valchez Premium Simple Timer V2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:transparent !important;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
}

#timer-widget {
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:130px;
  user-select:none;
}

.card {
  width:560px;
  background:#fff;
  border:2px solid rgba(0,0,0,0.15);
  border-radius:24px;
  box-shadow:0 2px 20px rgba(0,0,0,0.14), 0 0 0 1.5px rgba(0,0,0,0.08);
  padding:24px 28px 22px;
  text-align:center;
}

.title {
  font-family:'Cormorant Garamond', serif;
  font-size:52px;
  font-weight:700;
  line-height:1;
  color:#0a0a0a;
}

.subtitle {
  font-family:'Cormorant Garamond', serif;
  font-size:29px;
  font-weight:600;
  line-height:1.15;
  color:#0a0a0a;
  margin-top:6px;
}

.divider {
  height:2px;
  background:rgba(0,0,0,0.15);
  margin:15px 0;
}

.badge {
  display:inline-block;
  font-size:15px;
  font-weight:900;
  letter-spacing:.5px;
  text-transform:uppercase;
  padding:7px 15px;
  border-radius:12px;
  border:2px solid currentColor;
  margin-bottom:12px;
}

.timer {
  font-family:'Cormorant Garamond', serif;
  font-size:92px;
  font-weight:700;
  line-height:.95;
  letter-spacing:2px;
  color:#0a0a0a;
}

.timer.urgent {
  color:#dc2626;
  animation:pulse .6s ease-in-out infinite alternate;
}
@keyframes pulse {
  from { transform:scale(1); }
  to { transform:scale(1.04); }
}

.status {
  font-size:13px;
  font-weight:900;
  letter-spacing:1px;
  text-transform:uppercase;
  color:rgba(0,0,0,0.42);
  margin-top:12px;
}

.bar-wrap {
  height:8px;
  background:rgba(0,0,0,0.08);
  border-radius:8px;
  overflow:hidden;
  margin-top:16px;
}
.bar {
  height:100%;
  width:100%;
  background:#0a0a0a;
  border-radius:8px;
  transition:width .35s linear;
}
.bar.urgent { background:#dc2626; }

#control-panel {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.96);
  border:2px solid rgba(0,0,0,0.14);
  border-radius:20px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:9px;
  z-index:1000;
  box-shadow:0 8px 28px rgba(0,0,0,0.14);
  flex-wrap:wrap;
  justify-content:center;
  max-width:96vw;
}

.cp-label {
  color:rgba(0,0,0,0.42);
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
}

.title-input {
  background:#fafafa;
  border:1.5px solid #ddd;
  color:#0a0a0a;
  border-radius:10px;
  padding:8px 12px;
  font-family:'Cormorant Garamond', serif;
  font-size:18px;
  font-weight:700;
  width:150px;
  outline:none;
}

.time-btn {
  background:#fafafa;
  border:1.5px solid #ddd;
  color:#0a0a0a;
  font-family:'DM Sans', sans-serif;
  font-weight:900;
  font-size:12px;
  padding:7px 12px;
  border-radius:10px;
  cursor:pointer;
}
.time-btn.active {
  background:#0a0a0a;
  color:#fff;
  border-color:#0a0a0a;
}

.start-btn {
  background:#0a0a0a;
  border:none;
  color:white;
  font-family:'DM Sans', sans-serif;
  font-weight:900;
  font-size:13px;
  padding:9px 22px;
  border-radius:12px;
  cursor:pointer;
  text-transform:uppercase;
}

.reset-btn {
  background:#eee;
  border:1px solid #ddd;
  color:#555;
  font-family:'DM Sans', sans-serif;
  font-weight:900;
  font-size:12px;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

body.overlay-mode #control-panel { display:none !important; }
body.overlay-mode #timer-widget { margin-bottom:0; }
</style>
</head>
<body>

<div id="timer-widget">
  <div class="card">
    <div class="title" id="title">Ask Psychic Medium</div>
    <div class="subtitle" id="subtitle">Check "Viewer Wishlist"<br>to join the queue</div>
    <div class="divider"></div>
    <div class="badge" id="badge">YES / NO</div>
    <div class="timer" id="timer">00:10</div>
    <div class="status" id="status">Ready</div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  </div>
</div>

<div id="control-panel">
  <span class="cp-label">Title</span>
  <input class="title-input" id="titleInput" placeholder="Name/title">

  <button class="time-btn active" id="btn-yn" onclick="setType('yn')">YES/NO</button>
  <button class="time-btn" id="btn-q" onclick="setType('q')">QUESTION</button>
  <button class="time-btn" id="btn-guid" onclick="setType('guid')">GUIDANCE</button>
  <button class="time-btn" id="btn-mini" onclick="setType('mini')">MINI</button>
  <button class="time-btn" id="btn-med" onclick="setType('med')">MEDIUM</button>
  <button class="time-btn" id="btn-deep" onclick="setType('deep')">DEEP</button>

  <button class="start-btn" id="startBtn" onclick="startTimer()">▶ START</button>
  <button class="reset-btn" onclick="resetTimer()">↺ RESET</button>
</div>

<script>
let type = 'yn';
const TYPES = {
  yn:   { label:'YES / NO', time:10, color:'#555', border:'#ccc', bg:'#f5f5f5' },
  q:    { label:'QUESTION', time:20, color:'#2563eb', border:'#bfdbfe', bg:'#eff6ff' },
  guid: { label:'GUIDANCE', time:20, color:'#7c3aed', border:'#ddd6fe', bg:'#f5f3ff' },
  mini: { label:'MINI READING', time:60, color:'#059669', border:'#a7f3d0', bg:'#ecfdf5' },
  med:  { label:'MEDIUMSHIP', time:180, color:'#d97706', border:'#fde68a', bg:'#fffbeb' },
  deep: { label:'IN-DEPTH READING', time:300, color:'#dc2626', border:'#fecaca', bg:'#fef2f2' }
};

let total = TYPES[type].time;
let remaining = total;
let running = false;
let interval = null;

if (new URLSearchParams(location.search).get('overlay') === '1') {
  document.body.classList.add('overlay-mode');
}

function $(id){ return document.getElementById(id); }

function fmt(s){
  const m = Math.floor(s/60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function renderTitle(){
  const custom = $('titleInput').value.trim();
  if (custom) {
    $('title').textContent = custom;
    $('subtitle').textContent = TYPES[type].label;
  } else {
    $('title').textContent = 'Ask Psychic Medium';
    $('subtitle').innerHTML = 'Check "Viewer Wishlist"<br>to join the queue';
  }
}

function render(){
  const t = TYPES[type];
  renderTitle();

  $('badge').textContent = t.label;
  $('badge').style.color = t.color;
  $('badge').style.borderColor = t.border;
  $('badge').style.background = t.bg;

  $('timer').textContent = fmt(remaining);
  $('timer').classList.toggle('urgent', remaining <= 10 && remaining > 0 && running);

  const pct = total ? (remaining / total) * 100 : 0;
  $('bar').style.width = pct + '%';
  $('bar').classList.toggle('urgent', remaining <= 10 && remaining > 0);

  if (running) {
    $('status').textContent = 'Reading in progress';
    $('startBtn').textContent = '⏸ PAUSE';
  } else if (remaining <= 0) {
    $('status').textContent = 'Reading complete — press Start';
    $('startBtn').textContent = '▶ START AGAIN';
  } else {
    $('status').textContent = 'Ready';
    $('startBtn').textContent = '▶ START';
  }
}

function setType(newType){
  if (running) return;
  type = newType;
  total = TYPES[type].time;
  remaining = total;

  document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
  $('btn-' + newType).classList.add('active');

  resetTimer(false);
}

function startTimer(){
  if (running) {
    clearInterval(interval);
    running = false;
    render();
    return;
  }

  if (remaining <= 0) remaining = total;
  running = true;
  render();

  interval = setInterval(() => {
    remaining = Math.max(0, remaining - 1);
    render();

    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      render();
    }
  }, 1000);
}

function resetTimer(update=true){
  clearInterval(interval);
  running = false;
  remaining = total;
  render();
}

$('titleInput').addEventListener('input', render);

document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); startTimer(); }
  if (e.code === 'KeyR') resetTimer();
});

render();
</script>
</body>
</html>
